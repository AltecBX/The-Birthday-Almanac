<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>The Birthday Almanac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   styles/tokens.css
   ============================================================ */
:root{
  --paper:#F6F2E9; --paper-2:#FCF8EF; --card:#FFFDF8; --card-2:#FBF6EB;
  --ink:#1E2A38; --ink-2:#34404F; --muted:#766C5C; --faint:#9A8F7C;
  --hairline:#E4DAC6; --hairline-2:#EEE6D6;
  --navy:#16273B; --navy-2:#101E30; --navy-3:#22364E;
  --gold:#C29A45; --gold-deep:#A87E2E; --gold-soft:#E6CE8E; --gold-wash:#F2E7C9;
  --ok:#2E7D6B; --warn:#B5654A; --bad:#C0392B;
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --shadow:0 1px 2px rgba(28,42,56,.05),0 10px 30px rgba(28,42,56,.07);
  --shadow-sm:0 1px 2px rgba(28,42,56,.06);
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  /* category palette */
  --c-science:#3B6EA5; --c-math:#2D4A8A; --c-medicine:#C0392B; --c-invention:#4F8A6E;
  --c-engineers:#5A6770; --c-presidents:#3A4A7A; --c-politics:#B5654A; --c-leaders:#8E3B4F;
  --c-military:#6B7A52; --c-jurists:#7A3B2E; --c-religion:#7A5BA6; --c-philosophy:#3F8A8A;
  --c-economists:#2E7D6B; --c-art:#C08A2E; --c-culture:#5566A6; --c-music:#C2407A;
  --c-films:#8E4585; --c-directors:#5E3D7A; --c-business:#8A6D3B; --c-civilrights:#A14D6E;
  --c-explorers:#2F7D9E; --c-sports:#C2701C; --c-personal:#2FA39B;
}
*{box-sizing:border-box}
html{background:var(--paper);color-scheme:light only;-webkit-text-size-adjust:100%}
body{
  margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);
  line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:clip;
}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;margin:0;letter-spacing:.2px;line-height:1.12}
button{font-family:inherit;cursor:pointer}
a{color:var(--gold-deep);text-underline-offset:2px}
:focus-visible{outline:2.5px solid var(--gold-deep);outline-offset:2px;border-radius:6px}
.mono{font-family:var(--mono)}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

/* ============================================================
   HERO
   ============================================================ */
.hero{
  background:
    radial-gradient(1200px 420px at 78% -8%, rgba(194,154,69,.20), transparent 60%),
    linear-gradient(165deg,var(--navy-3),var(--navy) 46%,var(--navy-2));
  color:#F3ECDD;border-bottom:1px solid #0c1825;position:relative;overflow:hidden;
}
.hero::after{content:"";position:absolute;inset:0;opacity:.06;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,#fff 1px,transparent 0);background-size:22px 22px}
.hero-in{padding:30px 0 26px;position:relative;z-index:1;display:flex;gap:16px;align-items:center;justify-content:space-between}
.hero-text{flex:1 1 430px;min-width:0;position:relative;z-index:2}
.hero-art{flex:0 1 560px;max-width:54%;margin:0;align-self:stretch;display:flex;align-items:center;pointer-events:none}
/* screen blend drops the image's dark starfield into the navy hero so only the
   gold artwork glows through; the radial mask feathers the edges and lower
   opacity settles it into the page rather than reading as a framed picture */
.hero-art img{width:100%;height:auto;display:block;mix-blend-mode:screen;opacity:.82;
  -webkit-mask-image:radial-gradient(102% 104% at 62% 45%,#000 26%,rgba(0,0,0,0) 76%);
          mask-image:radial-gradient(102% 104% at 62% 45%,#000 26%,rgba(0,0,0,0) 76%)}
@media(max-width:860px){.hero-in{flex-direction:column;align-items:stretch;gap:4px}
  .hero-art{max-width:none;flex-basis:auto;order:-1;opacity:.92}}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin:0 0 12px}
.hero h1{font-size:clamp(34px,6vw,62px);color:#FAF4E6;font-weight:600;letter-spacing:.4px}
.hero h1 em{font-style:italic;color:var(--gold-soft);font-weight:500}
.lede{max-width:640px;margin:14px 0 0;color:#D8CFBC;font-size:15.5px}
.kpis{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.kpi{background:rgba(255,253,248,.05);border:1px solid rgba(230,206,142,.22);border-radius:var(--radius);padding:12px 16px;min-width:118px}
.kpi .v{font-family:var(--serif);font-size:26px;color:#FBF4E4;line-height:1}
.kpi .l{font-family:var(--mono);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-soft);margin-top:7px}
.method{margin-top:18px}
.method summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold-soft);
  border:1px solid rgba(230,206,142,.3);border-radius:999px;padding:7px 14px;background:rgba(255,253,248,.03)}
.method summary::-webkit-details-marker{display:none}
.method[open] summary{background:rgba(230,206,142,.1)}
.method .body{margin-top:14px;max-width:760px;color:#D8CFBC;font-size:14px;
  background:rgba(255,253,248,.04);border:1px solid rgba(230,206,142,.18);border-radius:var(--radius);padding:16px 18px}
.method .body b{color:#F3E8CC;font-weight:600}
.method ul{margin:10px 0 0;padding-left:18px}.method li{margin:5px 0}

/* ============================================================
   TOOLBAR
   ============================================================ */
.toolbar{position:sticky;top:0;z-index:40;background:rgba(246,242,233,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--hairline);box-shadow:0 1px 0 rgba(255,255,255,.6) inset}
.toolbar-in{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:11px 0}
.seg{display:inline-flex;background:var(--card-2);border:1px solid var(--hairline);border-radius:999px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;color:var(--ink-2);font-size:13px;font-weight:600;
  padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.seg button[aria-pressed="true"]{background:var(--navy);color:#F6EFDF;box-shadow:var(--shadow-sm)}
.seg.gold button[aria-pressed="true"]{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#241a06}
.seg .cnt{font-family:var(--mono);font-size:10.5px;opacity:.7}
.search{flex:1 1 200px;min-width:160px;position:relative}
.search input{width:100%;font-size:16px;font-family:var(--sans);color:var(--ink);
  background:var(--card);border:1px solid var(--hairline);border-radius:999px;padding:9px 14px 9px 36px}
.search input::placeholder{color:var(--faint)}
.search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px}
.tbtn{border:1px solid var(--hairline);background:var(--card);color:var(--ink-2);font-weight:600;font-size:13px;
  padding:8px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:7px}
.tbtn.on{background:var(--navy);color:#F6EFDF;border-color:var(--navy)}
.tbtn .dot{width:7px;height:7px;border-radius:50%;background:var(--gold-deep)}
select.tbtn{appearance:none;padding-right:26px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 15px) 55%,calc(100% - 10px) 55%;background-size:5px 5px,5px 5px;background-repeat:no-repeat}

/* ============================================================
   FILTER DRAWER
   ============================================================ */
.drawer{max-height:0;overflow:hidden;transition:max-height .28s ease;border-bottom:1px solid transparent;background:var(--paper-2)}
.drawer.open{max-height:1400px;border-bottom:1px solid var(--hairline)}
.drawer-in{padding:18px 0 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px 26px}
.fgroup h4{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.fam{margin-bottom:10px}
.fam-label{font-size:11px;color:var(--faint);font-weight:600;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--hairline);background:var(--card);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;
  color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
.chip .sw{width:9px;height:9px;border-radius:3px;flex:none}
.chip[aria-pressed="true"]{background:var(--navy);color:#F6EFDF;border-color:var(--navy)}
.chip .c{font-family:var(--mono);font-size:10px;opacity:.65}
.fsel{width:100%;font-size:13px;font-family:var(--sans);color:var(--ink);background:var(--card);
  border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:8px 10px}
.toggle{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--ink-2);padding:4px 0}
.toggle input{appearance:none;width:38px;height:22px;border-radius:999px;background:var(--hairline);position:relative;transition:.2s;flex:none;cursor:pointer}
.toggle input::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:.2s}
.toggle input:checked{background:var(--gold-deep)}
.toggle input:checked::after{left:18px}

/* ============================================================
   LAYOUT
   ============================================================ */
.spine{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:end;padding:20px 0 6px}
.scol{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;border:0;background:transparent;padding:0}
.sbar{width:100%;max-width:62px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--gold-soft),var(--gold));
  position:relative;display:flex;justify-content:center;transition:.18s;border:1px solid rgba(168,126,46,.35);border-bottom:0}
.scol:hover .sbar{filter:brightness(1.04)}
.scol[aria-current="true"] .sbar{background:linear-gradient(180deg,var(--navy-3),var(--navy))}
.sbar .n{font-family:var(--mono);font-size:10.5px;color:#3a2f12;position:absolute;top:-16px;font-weight:600}
.scol[aria-current="true"] .sbar .n{color:var(--navy)}
.sm{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
.spine-cap{font-size:12px;color:var(--faint);padding:0 0 4px}

.main{display:grid;grid-template-columns:1fr 308px;gap:26px;padding:18px 0 60px;align-items:start}
@media(max-width:920px){.main{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px}
.panel+.panel{margin-top:18px}
.aside{position:sticky;top:64px}
@media(max-width:920px){.aside{position:static}}

.viewhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.viewhead h2{font-size:23px;color:var(--ink);display:flex;align-items:baseline;gap:12px}
.viewhead h2 .sub{font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--faint)}
.navbtns{display:inline-flex;gap:6px}
.navbtns button{width:38px;height:38px;border-radius:50%;border:1px solid var(--hairline);background:var(--card-2);color:var(--ink);font-size:18px;line-height:1}
.navbtns button:hover{background:var(--gold-wash)}

/* ---- calendar ---- */
.cal-cap{font-size:12px;color:var(--faint);margin:-6px 0 12px;font-family:var(--mono)}
.weekhead{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:7px}
.weekhead div{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 0}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cell{aspect-ratio:1/1.04;border:1px solid var(--hairline-2);border-radius:11px;padding:7px;position:relative;
  background:var(--card-2);display:flex;flex-direction:column;overflow:hidden;text-align:left}
.cell.empty{background:transparent;border:1px dashed var(--hairline-2);opacity:.5}
.cell.has{cursor:pointer;border-color:var(--hairline)}
.cell.has:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px);transition:.12s}
.cell .dnum{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-2)}
.cell.today{outline:2px solid var(--gold-deep);outline-offset:-2px}
.cell .dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto}
.cell .dots i{width:7px;height:7px;border-radius:50%;display:block}
.cell .more{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:3px}
.cell .density{position:absolute;inset:0;border-radius:11px;pointer-events:none}
.cell .clab{position:relative;z-index:1;font-size:10.5px;color:var(--ink);font-weight:600;line-height:1.15;margin-top:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:620px){.calgrid,.weekhead{gap:4px}.cell{padding:4px;border-radius:8px}.cell .clab{display:none}}

.today-card{background:linear-gradient(120deg,var(--gold-wash),var(--card));border:1px solid var(--gold-soft);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.today-card .badge{font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-deep);font-weight:600}
.today-card a{font-weight:600;cursor:pointer}

/* ---- list view ---- */
.monthblock{margin-bottom:22px}
.monthblock h3{font-size:18px;color:var(--ink);border-bottom:2px solid var(--gold-soft);padding-bottom:7px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:baseline}
.monthblock h3 .c{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1px}
.prow{display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center;padding:9px 8px;border-radius:11px;border:1px solid transparent;text-align:left;background:transparent;width:100%}
.prow:hover{background:var(--card-2);border-color:var(--hairline-2)}
.prow .dd{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;line-height:1.2}
.prow .dd .z{font-size:14px;color:var(--gold-deep)}
.prow .nm{font-weight:600;color:var(--ink);font-size:15px}
.prow .ds{font-size:12.5px;color:var(--muted);margin-top:1px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.prow .rt{display:flex;align-items:center;gap:8px}
.ctag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;color:#fff;white-space:nowrap}
.rankpill{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--gold-deep);border:1px solid var(--gold-soft);background:var(--gold-wash);border-radius:999px;padding:2px 8px}

/* ---- timeline ---- */
.tl-era{margin-bottom:14px}
.tl-era .eh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tl-era .eh b{font-family:var(--serif);font-size:16px;color:var(--ink)}
.tl-era .eh span{font-family:var(--mono);font-size:11px;color:var(--faint)}
.tl-track{position:relative;height:46px;background:var(--card-2);border:1px solid var(--hairline-2);border-radius:10px;overflow:hidden}
.tl-track .tick{position:absolute;top:0;bottom:0;width:2px;background:var(--gold);opacity:.55}
.tl-track .tdot{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;border:2px solid var(--card);cursor:pointer}
.tl-axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:3px}

/* ---- charts ---- */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:720px){.chart-grid{grid-template-columns:1fr}}
.chart{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
.chart h3{font-size:15px;color:var(--ink);margin-bottom:3px}
.chart .cap{font-size:12px;color:var(--muted);margin-bottom:14px}
.bar-row{display:grid;grid-template-columns:42px 1fr 34px;gap:8px;align-items:center;margin:5px 0}
.bar-row .bl{font-family:var(--mono);font-size:11px;color:var(--muted)}
.bar-row .bt{height:16px;background:var(--hairline-2);border-radius:5px;overflow:hidden}
.bar-row .bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-deep));border-radius:5px}
.bar-row .bv{font-family:var(--mono);font-size:11px;color:var(--ink-2);text-align:right;font-weight:600}
.bar-row.nav .bf{background:linear-gradient(90deg,var(--navy-3),var(--navy))}
.stack{display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center;margin:4px 0}
.stack .sg{display:flex;height:15px;border-radius:5px;overflow:hidden;background:var(--hairline-2)}
.stack .sg i{height:100%}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.legend span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend i{width:9px;height:9px;border-radius:3px}
.crowd-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--hairline-2)}
.crowd-row:last-child{border-bottom:0}
.crowd-row .cd{font-family:var(--mono);font-size:12px;color:var(--gold-deep);font-weight:600;width:62px;flex:none}
.crowd-row .cn{font-size:13px;color:var(--ink-2)}
.crowd-row .cc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
.summary{font-size:12px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px dashed var(--hairline);font-style:italic}

/* year wheel */
.wheel-wrap{display:flex;justify-content:center;padding:6px 0}
.wheel text{font-family:var(--mono);fill:var(--ink-2)}
.wheel .wlab{font-size:9.5px;fill:var(--muted)}
.wheel .wctr{font-family:var(--serif)}

/* insight cards */
.insights{display:grid;gap:10px}
.icard{background:linear-gradient(135deg,var(--card),var(--card-2));border:1px solid var(--hairline);border-left:3px solid var(--gold);
  border-radius:var(--radius-sm);padding:12px 14px}
.icard .it{font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-bottom:5px}
.icard .ib{font-size:13.5px;color:var(--ink-2);line-height:1.4}
.icard .ib b{color:var(--ink);font-weight:700}

/* aside sidebar */
.aside .panel{padding:18px}
.aside h3{font-size:14px;font-family:var(--mono);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600}
.miniz{display:grid;gap:5px}
.zrow{display:grid;grid-template-columns:74px 1fr 22px;gap:8px;align-items:center}
.zrow .zl{font-size:12px;color:var(--ink-2)}
.zrow .zt{height:9px;background:var(--hairline-2);border-radius:4px;overflow:hidden}
.zrow .zf{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold-deep))}
.zrow .zv{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-family:var(--serif);font-size:22px;color:var(--ink-2);margin-bottom:8px}
.empty button{margin-top:14px}

/* ============================================================
   MODAL
   ============================================================ */
.scrim{position:fixed;inset:0;background:rgba(16,30,48,.55);backdrop-filter:blur(3px);z-index:90;
  display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}
@media(min-width:640px){.scrim{align-items:center;padding:24px}}
.modal{background:var(--card);width:100%;max-width:560px;max-height:90vh;overflow:auto;border-radius:20px 20px 0 0;
  box-shadow:0 20px 60px rgba(0,0,0,.3);transform:translateY(14px);transition:transform .2s;border:1px solid var(--hairline)}
@media(min-width:640px){.modal{border-radius:20px}}
.scrim.open .modal{transform:none}
.mtop{background:linear-gradient(160deg,var(--navy-3),var(--navy));color:#F3ECDD;padding:22px 22px 20px;position:relative;border-radius:20px 20px 0 0}
@media(max-width:639px){.mtop{border-radius:20px 20px 0 0}}
.mtop .mclose{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid rgba(230,206,142,.3);
  background:rgba(255,253,248,.06);color:#F3ECDD;font-size:18px;line-height:1}
.mtop .meyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mtop h2{font-size:27px;color:#FAF4E6;padding-right:30px}
.mtop .mdate{margin-top:10px;font-size:14px;color:#D8CFBC;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.mtop .zbig{font-size:18px;color:var(--gold-soft)}
.mbody{padding:20px 22px 24px}
.mbio{font-size:15.5px;color:var(--ink);line-height:1.55}
.mdesc{font-size:14px;color:var(--ink-2);margin-top:10px;line-height:1.55}
.mmeta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.mmeta .mi{background:var(--card-2);border:1px solid var(--hairline-2);border-radius:10px;padding:9px 11px}
.mmeta .mi .k{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.mmeta .mi .v{font-size:13px;color:var(--ink-2);font-weight:500}
.mnote{margin-top:14px;font-size:12.5px;color:var(--muted);background:var(--gold-wash);border-radius:10px;padding:10px 12px;border:1px solid var(--gold-soft)}
.msrc{margin-top:16px;font-size:13px}
.conf{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:999px}
.conf.high{background:rgba(46,125,107,.12);color:var(--ok)} .conf.medium{background:rgba(181,101,74,.12);color:var(--warn)} .conf.low{background:rgba(192,57,43,.1);color:var(--bad)}

/* day modal list */
.daylist{padding:18px 22px 24px}
.daylist .dr{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--hairline-2);width:100%;text-align:left;background:transparent;border-left:0;border-right:0;border-top:0}
.daylist .dr:hover{background:var(--card-2)}
.daylist .dr .nm{font-weight:600;color:var(--ink)}
.daylist .dr .ds{font-size:12px;color:var(--muted)}

/* ============================================================
   DEV PANEL + footer
   ============================================================ */
.foot{border-top:1px solid var(--hairline);padding:24px 0 40px;color:var(--muted);font-size:12.5px}
.foot a{cursor:pointer}
.devbtn{border:1px solid var(--hairline);background:var(--card);color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px}
.devpanel{position:fixed;right:14px;bottom:14px;width:330px;max-height:60vh;overflow:auto;z-index:80;
  background:var(--navy);color:#E8E0CE;border:1px solid var(--navy-3);border-radius:14px;box-shadow:0 16px 50px rgba(0,0,0,.4);padding:14px;display:none;font-family:var(--mono);font-size:11.5px}
.devpanel.open{display:block}
.devpanel h4{font-family:var(--mono);color:var(--gold-soft);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
.devpanel .ok{color:#8FD3B6}.devpanel .er{color:#F0A48E}
.devpanel .row{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.07);line-height:1.4}
.devpanel .x{cursor:pointer;color:#E8E0CE}
</style>

/* ============================================================

const ZODIAC=[
  {sign:"Capricorn",sym:"\u2651",from:[12,22],to:[1,19]},{sign:"Aquarius",sym:"\u2652",from:[1,20],to:[2,18]},
  {sign:"Pisces",sym:"\u2653",from:[2,19],to:[3,20]},{sign:"Aries",sym:"\u2648",from:[3,21],to:[4,19]},
  {sign:"Taurus",sym:"\u2649",from:[4,20],to:[5,20]},{sign:"Gemini",sym:"\u264A",from:[5,21],to:[6,20]},
  {sign:"Cancer",sym:"\u264B",from:[6,21],to:[7,22]},{sign:"Leo",sym:"\u264C",from:[7,23],to:[8,22]},
  {sign:"Virgo",sym:"\u264D",from:[8,23],to:[9,22]},{sign:"Libra",sym:"\u264E",from:[9,23],to:[10,22]},
  {sign:"Scorpio",sym:"\u264F",from:[10,23],to:[11,21]},{sign:"Sagittarius",sym:"\u2650",from:[11,22],to:[12,21]}
];
function zodiac(m,d){
  if(!m||!d)return null;
  for(const z of ZODIAC){const[fm,fd]=z.from,[tm,td]=z.to;
    if(fm===tm){if(m===fm&&d>=fd&&d<=td)return z;}
    else if((m===fm&&d>=fd)||(m===tm&&d<=td))return z;}
  return null;
}

/* ============================================================
   utils/dateUtils.js
   ============================================================ */
const DIM=[31,29,31,30,31,30,31,31,30,31,30,31];
function fmtYear(p){if(p.birthYear==null)return null;return p.era==="BC"?(Math.abs(p.birthYear)+" BC"):String(p.birthYear);}
function fmtDate(p){
  if(!p.month)return "Date unknown";
  let s=MONTHS[p.month-1]+(p.day?(" "+p.day):"");
  const y=fmtYear(p);if(y)s+=", "+y;
  if(p.dateStatus==="estimated")s+=" (estimated)";
  return s;
}
function periodOf(p){
  const y=p.birthYear;if(y==null)return "Unknown";
  if(p.era==="BC"||y<500)return "Ancient";
  if(y<1400)return "Medieval";
  if(y<1800)return "Early modern";
  if(y<1940)return "Modern";
  return "Contemporary";
}
const PERIODS=["Ancient","Medieval","Early modern","Modern","Contemporary"];
function centuryOf(p){
  const y=p.birthYear;if(y==null)return null;
  if(p.era==="BC")return "Ancient (BCE)";
  const c=Math.floor((y-1)/100)+1;
  const suf=(c%10===1&&c%100!==11)?"st":(c%10===2&&c%100!==12)?"nd":(c%10===3&&c%100!==13)?"rd":"th";
  return c+suf+" century";
}

/* ============================================================
   utils/validation.js  (+ tests)
   ============================================================ */
function validate(list){
  const w=[];const seen={};
  list.forEach(p=>{
    const id=p.name||p.id||"(unnamed)";
    if(!p.name)w.push(["Missing name on "+(p.id||"?"),"er"]);
    if(!p.category)w.push(["Missing category: "+id,"er"]);
    if(p.month!=null&&(p.month<1||p.month>12))w.push(["Invalid month ("+p.month+"): "+id,"er"]);
    if(p.day!=null&&(p.day<1||p.day>31))w.push(["Invalid day ("+p.day+"): "+id,"er"]);
    if(p.month&&p.day&&p.day>DIM[p.month-1])w.push(["Day "+p.day+" out of range for "+MONTHS[p.month-1]+": "+id,"er"]);
    if(!["exact","estimated","unknown"].includes(p.dateStatus))w.push(["Invalid dateStatus ("+p.dateStatus+"): "+id,"er"]);
    if(!p.isPersonal&&!p.sourceUrl&&p.dateStatus!=="unknown")w.push(["Missing sourceUrl: "+id,"wn"]);
    if(p.name){if(seen[p.name])w.push(["Duplicate name: "+p.name,"er"]);seen[p.name]=1;}
  });
  return w;
}
function runTests(){
  const t=[];const a=(n,c)=>t.push([n,!!c]);
  a("Zodiac: Mar 21 = Aries",zodiac(3,21).sign==="Aries");
  a("Zodiac: Mar 20 = Pisces",zodiac(3,20).sign==="Pisces");

  a("Zodiac: Jul 23 = Leo (boundary)",zodiac(7,23).sign==="Leo");
  a("Leap day Feb 29 accepted",DIM[1]===29);
  a("Unknown date returns no zodiac",zodiac(null,null)===null);
  a("No duplicate names",new Set(PEOPLE.map(p=>p.name)).size===PEOPLE.length);
  a("All months valid",PEOPLE.every(p=>p.month==null||(p.month>=1&&p.month<=12)));
  a("All days valid",PEOPLE.every(p=>p.day==null||(p.day>=1&&p.day<=31)));
  a("Estimated/unknown dates preserved",PEOPLE.some(p=>p.dateStatus==="estimated")&&PEOPLE.some(p=>p.dateStatus==="unknown"));
  a("Filter: search 'newton' finds Newton",search(PEOPLE,"newton").some(p=>p.name==="Isaac Newton"));
  a("Filter: search across bio (telephone)",search(PEOPLE,"telephone").some(p=>p.name==="Alexander Graham Bell"));
  a("Every dated exact figure has a bio",PEOPLE.filter(p=>p.dateStatus==="exact"&&!p.isPersonal).every(p=>p.bio));
  return t;
}

/* ============================================================
   utils/insights.js
   ============================================================ */
function monthCounts(list){const c=Array(12).fill(0);list.forEach(p=>{if(p.month)c[p.month-1]++;});return c;}
function catMonthPeak(list,cat){
  const c=Array(12).fill(0);list.forEach(p=>{if(p.category===cat&&p.month)c[p.month-1]++;});
  const mx=Math.max(...c);if(mx===0)return null;return {month:c.indexOf(mx),n:mx};
}
function zodiacCounts(list){const z={};ZODIAC.forEach(s=>z[s.sign]=0);list.forEach(p=>{const s=zodiac(p.month,p.day);if(s)z[s.sign]++;});return z;}
function crowded(list){
  const map={};list.forEach(p=>{if(p.month&&p.day){const k=p.month+"-"+p.day;(map[k]=map[k]||[]).push(p);}});
  return Object.entries(map).filter(([,v])=>v.length>1)
    .map(([k,v])=>{const[m,d]=k.split("-").map(Number);return {m,d,people:v.sort((a,b)=>a.name.localeCompare(b.name))};})
    .sort((a,b)=>b.people.length-a.people.length);
}
function insights(list){
  const out=[];const mc=monthCounts(list);const tot=mc.reduce((a,b)=>a+b,0);
  if(tot===0)return out;
  const mx=Math.max(...mc);const peak=mc.indexOf(mx);
  out.push(["Concentration",`<b>${MONTHS[peak]}</b> holds the most birthdays in this view, with <b>${mx}</b> of ${tot} dated figures.`]);
  const pres=catMonthPeak(list,"presidents");
  if(pres&&pres.n>=2)out.push(["Presidents",`<b>${MONTHS[pres.month]}</b> has the highest concentration of US presidents (<b>${pres.n}</b>).`]);
  const ath=catMonthPeak(list,"sports");
  if(ath&&ath.n>=2)out.push(["Athletes",`<b>${MONTHS[ath.month]}</b> leads for athletes (<b>${ath.n}</b>) in the current view.`]);
  const ld=catMonthPeak(list,"leaders");
  if(ld&&ld.n>=2)out.push(["World leaders",`<b>${MONTHS[ld.month]}</b> carries the most world leaders (<b>${ld.n}</b>).`]);
  const zc=zodiacCounts(list);const zsorted=Object.entries(zc).sort((a,b)=>b[1]-a[1]).filter(e=>e[1]>0);
  if(zsorted.length>=2)out.push(["Zodiac",`<b>${zsorted[0][0]}</b> and <b>${zsorted[1][0]}</b> are the most common signs here.`]);
  const cr=crowded(list);
  if(cr.length){const top=cr[0];out.push(["Shared dates",`<b>${MONTHS[top.m-1]} ${top.d}</b> is the most crowded birthday, shared by <b>${top.people.length}</b> figures.`]);}
  const per={};list.forEach(p=>{const k=periodOf(p);per[k]=(per[k]||0)+1;});
  const pe=Object.entries(per).filter(([k])=>k!=="Unknown").sort((a,b)=>b[1]-a[1]);
  if(pe.length)out.push(["Era",`Most figures here come from the <b>${pe[0][0]}</b> period (<b>${pe[0][1]}</b>).`]);
  return out;
}

/* ============================================================
   SECURITY: escape + DOM builders
   ============================================================ */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function el(tag,attrs,kids){
  const n=document.createElement(tag);
  if(attrs)for(const k in attrs){
    const v=attrs[k];if(v==null||v===false)continue;
    if(k==="class")n.className=v;
    else if(k==="text")n.textContent=v;
    else if(k==="html")n.innerHTML=v; // only used with pre-escaped/static strings
    else if(k.slice(0,2)==="on")n.addEventListener(k.slice(2).toLowerCase(),v);
    else n.setAttribute(k,v);
  }
  if(kids)(Array.isArray(kids)?kids:[kids]).forEach(c=>{if(c==null)return;n.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return n;
}

/* ============================================================
   STATE + derived fields
   ============================================================ */
PEOPLE.forEach(p=>{const z=zodiac(p.month,p.day);p.zsign=z?z.sign:null;p.zsym=z?z.sym:null;});
const now=new Date();
let state={
  mode:"all",view:"calendar",search:"",sort:"date",
  drawer:false,calYear:now.getFullYear(),calMonth:now.getMonth(),
  f:{cats:new Set(),centuries:new Set(),periods:new Set(),country:"",zodiac:"",gender:"",
     status:{exact:true,estimated:true,unknown:true}}
};

function basePool(){
  if(state.mode==="personal")return PEOPLE.filter(p=>p.isPersonal);
  return PEOPLE.slice(); // all figures, including personal entries
}
function search(list,q){
  q=(q||"").trim().toLowerCase();if(!q)return list;
  return list.filter(p=>[p.name,CATS[p.category]&&CATS[p.category].label,p.subCategory,p.shortDescription,p.bio,p.countryOrCivilization,p.zsign]
    .some(v=>v&&String(v).toLowerCase().includes(q)));
}
function applyFilters(list){
  const f=state.f;
  return list.filter(p=>{
    if(f.cats.size&&!f.cats.has(p.category))return false;
    if(f.periods.size&&!f.periods.has(periodOf(p)))return false;
    if(f.centuries.size&&!f.centuries.has(centuryOf(p)))return false;
    if(f.country&&p.countryOrCivilization!==f.country)return false;
    if(f.zodiac&&p.zsign!==f.zodiac)return false;
    if(f.gender&&p.sex!==f.gender)return false;
    const st=f.status;if(!st[p.dateStatus])return false;
    return true;
  });
}
function sortList(list){
  const s=state.sort;const a=list.slice();
  const yr=p=>p.birthYear==null?Infinity:(p.era==="BC"?-Math.abs(p.birthYear):p.birthYear);
  const byDate=(x,y)=>(x.month||13)-(y.month||13)||(x.day||32)-(y.day||32)||x.name.localeCompare(y.name);
  if(s==="year")a.sort((x,y)=>yr(x)-yr(y)||x.name.localeCompare(y.name));
  else if(s==="name")a.sort((x,y)=>x.name.localeCompare(y.name));
  else if(s==="category")a.sort((x,y)=>(CATS[x.category].label).localeCompare(CATS[y.category].label)||byDate(x,y));
  else a.sort(byDate);
  return a;
}
function current(){return sortList(applyFilters(search(basePool(),state.search)));}

function renderHero(){

  ];
  const box=document.getElementById("kpis");box.innerHTML="";
  kpis.forEach(k=>box.appendChild(el("div",{class:"kpi"},[el("div",{class:"v",text:String(k[1])}),el("div",{class:"l",text:k[3]})])));

function renderDrawer(){
  const pool=basePool();const inView=applyFilters(search(pool,state.search));
  const din=document.getElementById("drawerIn");din.innerHTML="";
  const count=k=>pool.filter(p=>p.category===k).length;
  // categories grouped by family
  const catG=el("div",{class:"fgroup"},[el("h4",{text:"Category"})]);
  FAMILIES.forEach(fam=>{
    const present=fam.cats.filter(k=>count(k)>0);if(!present.length)return;
    const fdiv=el("div",{class:"fam"},[el("div",{class:"fam-label",text:fam.label})]);
    const chips=el("div",{class:"chips"});
    present.forEach(k=>{
      const on=state.f.cats.has(k);
      const b=el("button",{class:"chip","aria-pressed":on?"true":"false",onClick:()=>{toggleSet(state.f.cats,k);render();}},
        [el("i",{class:"sw"}),CATS[k].label,el("span",{class:"c",text:String(count(k))})]);
      b.querySelector(".sw").style.background=catColor(k);
      chips.appendChild(b);
    });
    fdiv.appendChild(chips);catG.appendChild(fdiv);
  });
  din.appendChild(catG);
  // period
  const perG=el("div",{class:"fgroup"},[el("h4",{text:"Historical period"})]);
  const perChips=el("div",{class:"chips"});
  PERIODS.forEach(pr=>{
    const n=pool.filter(p=>periodOf(p)===pr).length;if(!n)return;
    const on=state.f.periods.has(pr);
    perChips.appendChild(el("button",{class:"chip","aria-pressed":on?"true":"false",onClick:()=>{toggleSet(state.f.periods,pr);render();}},
      [pr,el("span",{class:"c",text:String(n)})]));

function chartWheel(list){
  const ch=el("div",{class:"chart",style:"margin-top:18px"});
  ch.appendChild(el("h3",{text:"The year wheel"}));
  ch.appendChild(el("div",{class:"cap",text:"Twelve months as a ring. Longer, brighter spokes hold more births."}));
  const c=monthCounts(list);const mx=Math.max(1,...c);const tot=c.reduce((a,b)=>a+b,0);
  const S=320,cx=S/2,cy=S/2,r0=46,r1=140;
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");svg.setAttribute("viewBox","0 0 "+S+" "+S);svg.setAttribute("class","wheel");
  svg.setAttribute("width","320");svg.setAttribute("height","320");svg.setAttribute("role","img");
  svg.setAttribute("aria-label","Year wheel of birth month concentration. "+MONTHS[c.indexOf(Math.max(...c))]+" is the fullest month.");
  for(let i=0;i<12;i++){
    const a0=(i/12)*2*Math.PI-Math.PI/2, a1=((i+1)/12)*2*Math.PI-Math.PI/2;
    const frac=c[i]/mx;const rr=r0+(r1-r0)*(0.18+0.82*frac);
    const pad=0.03;
    const path=document.createElementNS(NS,"path");
    const x0=cx+r0*Math.cos(a0+pad),y0=cy+r0*Math.sin(a0+pad);
    const x1=cx+rr*Math.cos(a0+pad),y1=cy+rr*Math.sin(a0+pad);
    const x2=cx+rr*Math.cos(a1-pad),y2=cy+rr*Math.sin(a1-pad);
    const x3=cx+r0*Math.cos(a1-pad),y3=cy+r0*Math.sin(a1-pad);
    path.setAttribute("d",`M${x0} ${y0} L${x1} ${y1} A${rr} ${rr} 0 0 1 ${x2} ${y2} L${x3} ${y3} A${r0} ${r0} 0 0 0 ${x0} ${y0} Z`);
    path.setAttribute("fill",`hsl(41 55% ${72-frac*34}%)`);
    path.setAttribute("stroke","#FFFDF8");path.setAttribute("stroke-width","1.5");
    const tt=document.createElementNS(NS,"title");tt.textContent=MONTHS[i]+": "+c[i];path.appendChild(tt);
    svg.appendChild(path);
    const am=(a0+a1)/2;const lr=r1+12;
    const tx=document.createElementNS(NS,"text");
    tx.setAttribute("x",cx+lr*Math.cos(am));tx.setAttribute("y",cy+lr*Math.sin(am)+3);
    tx.setAttribute("text-anchor","middle");tx.setAttribute("class","wlab");tx.textContent=MS[i];
    svg.appendChild(tx);
  }
  const ct=document.createElementNS(NS,"text");ct.setAttribute("x",cx);ct.setAttribute("y",cy-4);
  ct.setAttribute("text-anchor","middle");ct.setAttribute("class","wctr");ct.setAttribute("font-size","26");ct.setAttribute("fill","#1E2A38");ct.textContent=String(tot);
  svg.appendChild(ct);
  const cl=document.createElementNS(NS,"text");cl.setAttribute("x",cx);cl.setAttribute("y",cy+14);
  cl.setAttribute("text-anchor","middle");cl.setAttribute("class","wlab");cl.setAttribute("font-size","9");cl.textContent="DATED";
  svg.appendChild(cl);
  ch.appendChild(el("div",{class:"wheel-wrap"},[svg]));
  return ch;
}

    if(p.shortDescription&&p.shortDescription!==p.bio)body.appendChild(el("div",{class:"mdesc",text:p.shortDescription}));
    const meta=el("div",{class:"mmeta"});
    if(p.countryOrCivilization)meta.appendChild(metaItem("Origin",p.countryOrCivilization));
    meta.appendChild(metaItem("Period",periodOf(p)+(centuryOf(p)?" \u00b7 "+centuryOf(p):"")));
    meta.appendChild(metaItem("Birth date",fmtDate(p)));
    const cf=p.confidence||(p.dateStatus==="exact"?"high":p.dateStatus==="estimated"?"medium":"low");
    const ci=el("div",{class:"mi"});ci.appendChild(el("div",{class:"k",text:"Date confidence"}));
    ci.appendChild(el("span",{class:"conf "+cf,text:cf+" \u00b7 "+p.dateStatus}));meta.appendChild(ci);
    body.appendChild(meta);
    if(p.calendarNote)body.appendChild(el("div",{class:"mnote",text:p.calendarNote}));
    if(p.sourceUrl){const s=el("div",{class:"msrc"});
      s.appendChild(el("a",{href:p.sourceUrl,target:"_blank",rel:"noopener",text:"Source: "+(p.sourceName||"reference")+" \u2197"}));body.appendChild(s);}
    m.appendChild(body);return m;
  });
}
function openDay(month,day,ppl){
  openModal(()=>{
    const m=el("div");
    const top=el("div",{class:"mtop"});
    top.appendChild(el("button",{class:"mclose","aria-label":"Close",html:"&times;",onClick:closeModal}));
    top.appendChild(el("div",{class:"meyebrow"},[el("span",{text:ppl.length+" figures share this day"})]));
    top.appendChild(el("h2",{id:"modalTitle",text:MONTHS[month-1]+" "+day}));
    const z=zodiac(month,day);if(z)top.appendChild(el("div",{class:"mdate"},[el("span",{class:"zbig",text:z.sym}),el("span",{text:z.sign})]));
    m.appendChild(top);
    const dl=el("div",{class:"daylist"});
    ppl.forEach(p=>{
      const r=el("button",{class:"dr",onClick:()=>openPerson(p)});
      const left=el("div",{},[el("div",{class:"nm",text:p.name}),el("div",{class:"ds",text:(p.shortDescription||p.bio||"").slice(0,80)})]);
      const right=el("div",{class:"rt"});
      const tag=el("span",{class:"ctag",text:CATS[p.category].label});tag.style.background=catColor(p.category);right.appendChild(tag);
      r.append(left,right);dl.appendChild(r);
    });
    m.appendChild(dl);return m;
  });
}

/* ============================================================
   DEV PANEL
   ============================================================ */
function renderDev(){
  const dp=document.getElementById("devPanel");dp.innerHTML="";
  const warns=validate(PEOPLE);const tests=runTests();
  const head=el("h4",{},[document.createTextNode("Validation & tests"),el("span",{class:"x",text:"\u00d7",role:"button",onClick:()=>dp.classList.remove("open")})]);
  dp.appendChild(head);
  const pass=tests.filter(t=>t[1]).length;
  dp.appendChild(el("div",{class:"row "+(pass===tests.length?"ok":"er"),text:"Tests: "+pass+"/"+tests.length+" passing"}));
  tests.filter(t=>!t[1]).forEach(t=>dp.appendChild(el("div",{class:"row er",text:"FAIL: "+t[0]})));
  dp.appendChild(el("div",{class:"row "+(warns.length?"er":"ok"),text:"Data warnings: "+warns.length}));
  warns.slice(0,40).forEach(w=>dp.appendChild(el("div",{class:"row "+(w[1]==="er"?"er":""),text:(w[1]==="er"?"\u2715 ":"\u26a0 ")+w[0]})));
  if(pass===tests.length&&!warns.length)dp.appendChild(el("div",{class:"row ok",text:"All clean. No duplicates, dates valid, personal kept separate."}));
}

/* ============================================================
   TOOLBAR wiring + render dispatcher
   ============================================================ */
function syncSeg(){
  document.querySelectorAll("#viewSeg button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.view===state.view?"true":"false"));
  document.querySelectorAll("#modeSeg button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.mode===state.mode?"true":"false"));
}
function render(){
  renderHero();syncSeg();renderDrawer();renderSpine();
  const list=current();
  if(state.view==="calendar")renderCalendar(list);
  else if(state.view==="list")renderList(list);
  else if(state.view==="timeline")renderTimeline(list);
  else renderCharts(list);
  renderAside(list);
  const fb=document.getElementById("filterBtn"),fd=document.getElementById("fdot"),n=activeFilterCount();
  fd.style.display=n?"inline-block":"none";fb.classList.toggle("on",state.drawer);
  document.getElementById("footnote").innerHTML="The Birthday Almanac \u00b7 "+esc(String(PEOPLE.length))+" figures \u00b7 dates marked exact, estimated, or unknown, never invented.";
}
function resetAll(){
  state.search="";document.getElementById("search").value="";
  state.f={cats:new Set(),centuries:new Set(),periods:new Set(),country:"",zodiac:"",gender:"",
    status:{exact:true,estimated:true,unknown:true}};
  state.sort="date";document.getElementById("sortSel").value="date";
  render();
}
document.querySelectorAll("#modeSeg button").forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;
  if(state.mode==="personal"&&state.view==="calendar"){/*ok*/}render();});
document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render();});
document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value;render();});
document.getElementById("sortSel").addEventListener("change",e=>{state.sort=e.target.value;render();});
document.getElementById("resetBtn").onclick=resetAll;
document.getElementById("filterBtn").onclick=()=>{state.drawer=!state.drawer;
  document.getElementById("drawer").classList.toggle("open",state.drawer);
  document.getElementById("filterBtn").setAttribute("aria-expanded",state.drawer?"true":"false");
  document.getElementById("filterBtn").classList.toggle("on",state.drawer);};
document.getElementById("devBtn").onclick=()=>{const dp=document.getElementById("devPanel");dp.classList.toggle("open");if(dp.classList.contains("open"))renderDev();};
// keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){const s=document.getElementById("scrim");if(s.classList.contains("open"))return closeModal();
    if(state.drawer){state.drawer=false;document.getElementById("drawer").classList.remove("open");document.getElementById("filterBtn").setAttribute("aria-expanded","false");document.getElementById("filterBtn").classList.remove("on");}}
  if(state.view==="calendar"&&!document.getElementById("scrim").classList.contains("open")){
    const tag=(document.activeElement&&document.activeElement.tagName)||"";
    if(tag==="INPUT"||tag==="SELECT"||tag==="TEXTAREA")return;
    if(e.key==="ArrowLeft")stepMonth(-1);if(e.key==="ArrowRight")stepMonth(1);
  }
});
// focus trap
document.getElementById("scrim").addEventListener("keydown",e=>{
  if(e.key!=="Tab")return;const f=[...document.getElementById("modal").querySelectorAll('button,a[href],[tabindex]:not([tabindex="-1"])')].filter(x=>x.offsetParent!==null);
  if(!f.length)return;const first=f[0],last=f[f.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
});
document.getElementById("scrim").addEventListener("click",e=>{if(e.target.id==="scrim")closeModal();});
if(location.search.indexOf("dev")>=0){document.getElementById("devPanel").classList.add("open");renderDev();}
render();
</script>
